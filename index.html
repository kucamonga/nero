<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KOSMOS | Astro Engine</title>

<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>

<style>
body {
    margin:0;
    background:#0b0f1a;
    color:#e2e8f0;
    font-family:Arial;
}

h1 {
    text-align:center;
    color:gold;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:20px;
}

.card {
    background:#111827;
    padding:15px;
    border-radius:10px;
}

.alert {
    background:#7c2d12;
    padding:10px;
    margin:10px;
    border-radius:6px;
}
</style>
</head>

<body>

<h1>KOSMOS 🔮</h1>

<div id="status" class="grid"></div>
<div id="planets" class="grid"></div>
<div id="houses" class="grid"></div>
<div id="aspects" class="grid"></div>
<div id="alerts"></div>

<script>
// ================= GEO =================
let observer;

async function initGeo() {
    return new Promise(res=>{
        navigator.geolocation.getCurrentPosition(pos=>{
            observer = new Astronomy.Observer(
                pos.coords.latitude,
                pos.coords.longitude,
                0
            );
            res();
        }, ()=>{
            observer = new Astronomy.Observer(0,0,0);
            res();
        });
    });
}

// ================= PLANETAS =================
const bodies = ["Sun","Moon","Mercury","Venus","Mars","Jupiter","Saturn","Uranus","Neptune","Pluto"];

function getPositions(date){
    return bodies.map(b=>{
        const pos = Astronomy.EclipticPos(b, date);
        return {name:b, lon:pos.lon};
    });
}

// ================= SIGNOS =================
const signos = ["Áries","Touro","Gêmeos","Câncer","Leão","Virgem","Libra","Escorpião","Sagitário","Capricórnio","Aquário","Peixes"];

function getSign(lon){
    return signos[Math.floor(lon/30)];
}

// ================= LUA REAL =================
function moonPhase(date){
    const phase = Astronomy.MoonPhase(date);
    return phase.toFixed(2) + "%";
}

// ================= ASCENDENTE =================
function getAscendente(date){
    const sidereal = Astronomy.SiderealTime(date);
    const asc = (sidereal * 15) % 360;
    return getSign(asc);
}

// ================= ASPECTOS =================
function calcAspects(planets){
    const aspects = [];
    const angles = [
        {name:"Conjunção", deg:0},
        {name:"Oposição", deg:180},
        {name:"Trígono", deg:120},
        {name:"Quadratura", deg:90}
    ];

    for(let i=0;i<planets.length;i++){
        for(let j=i+1;j<planets.length;j++){
            let diff = Math.abs(planets[i].lon - planets[j].lon);
            if(diff>180) diff = 360-diff;

            angles.forEach(a=>{
                if(Math.abs(diff - a.deg) < 5){
                    aspects.push(`${a.name}: ${planets[i].name} - ${planets[j].name}`);
                }
            });
        }
    }
    return aspects;
}

// ================= ALERTAS =================
async function sendAlert(msg){
    document.getElementById("alerts").innerHTML += `<div class="alert">${msg}</div>`;

    await fetch("/.netlify/functions/log-event", {
        method:"POST",
        body: JSON.stringify({msg})
    });
}

// ================= RENDER =================
function render(){
    const now = new Date();

    const planets = getPositions(now);

    // STATUS
    document.getElementById("status").innerHTML = `
        <div class="card">Lua: ${moonPhase(now)}</div>
        <div class="card">Ascendente: ${getAscendente(now)}</div>
    `;

    // PLANETAS
    document.getElementById("planets").innerHTML =
        planets.map(p=>`<div class="card">${p.name} em ${getSign(p.lon)}</div>`).join("");

    // CASAS (simplificado)
    document.getElementById("houses").innerHTML =
        `<div class="card">Sistema de casas baseado no Ascendente (${getAscendente(now)})</div>`;

    // ASPECTOS
    const aspects = calcAspects(planets);
    document.getElementById("aspects").innerHTML =
        aspects.map(a=>`<div class="card">${a}</div>`).join("");

    // ALERTAS
    if(aspects.some(a=>a.includes("Conjunção"))){
        sendAlert("🔔 Conjunção detectada!");
    }
}

// ================= LOOP =================
async function start(){
    await initGeo();
    render();
    setInterval(render, 20000);
}

start();
</script>

</body>
</html>
