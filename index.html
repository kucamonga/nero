<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmos | Sistema de Efemérides Real-Time</title>

    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Space+Grotesk:wght@300;400&display=swap');

        :root {
            --fogo: #ef4444;
            --terra: #22c55e;
            --ar: #eab308;
            --agua: #3b82f6;
            --espirito: #a855f7;
            --gold: #d4af37;
        }

        body {
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #e2e8f0;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3em;
            color: var(--gold);
            margin: 0;
            letter-spacing: 4px;
        }

        .info-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .status-pill {
            background: rgba(255,255,255,0.05);
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            font-size: 0.9em;
            color: var(--gold);
        }

        .conjunctions-box {
            max-width: 1200px;
            margin: 0 auto 30px;
            text-align: center;
            padding: 15px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold);
            border-radius: 8px;
            font-family: 'Cinzel';
        }

        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto 40px;
        }

        .sign-card {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 12px;
            padding: 15px;
            border-left: 5px solid #334155;
            transition: 0.3s;
        }

        .active-sign {
            border: 1px solid var(--gold);
            border-left: 5px solid var(--gold);
            box-shadow: 0 0 20px rgba(212,175,55,0.3);
        }

        .sign-name {
            font-family: 'Cinzel';
            margin: 0 0 10px;
        }

        .planets-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .planets-list li {
            margin-bottom: 5px;
            font-weight: bold;
        }

        h2 {
            text-align: center;
            font-family: 'Cinzel';
            color: var(--gold);
        }

        .elements-table {
            max-width: 900px;
            margin: 20px auto;
        }

        .el-row {
            display: grid;
            grid-template-columns: 1fr 2fr 2fr 1fr;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

<body>

<header>
    <h1>KOSMOS</h1>

    <div class="info-bar">
        <div id="moon-display" class="status-pill"></div>
        <div id="sun-display" class="status-pill"></div>
        <div class="status-pill">Tempo Real</div>
    </div>
</header>

<div id="conjunctions" class="conjunctions-box">
    Carregando dados...
</div>

<div id="zodiac-container" class="zodiac-grid"></div>

<h2>Elementos & Arcanos</h2>

<div id="elements-container" class="elements-table"></div>

<script>
const REFRESH_INTERVAL = 30000;

let observer;

// ================= GEO =================
function initObserver() {
    return new Promise(resolve => {
        navigator.geolocation.getCurrentPosition(
            pos => {
                observer = new Astronomy.Observer(
                    pos.coords.latitude,
                    pos.coords.longitude,
                    0
                );
                resolve();
            },
            () => {
                observer = new Astronomy.Observer(0,0,0);
                resolve();
            }
        );
    });
}

// ================= LUA =================
function calcularLua(d) {
    const dias = (d - new Date(2000,0,6)) / 86400000;
    const fase = ((dias % 29.53)+29.53)%29.53 / 29.53;

    if (fase < 0.25) return "🌒 Crescente";
    if (fase < 0.5) return "🌕 Cheia";
    if (fase < 0.75) return "🌘 Minguante";
    return "🌑 Nova";
}

// ================= SIGNOS =================
const signos = ["Áries","Touro","Gêmeos","Câncer","Leão","Virgem","Libra","Escorpião","Sagitário","Capricórnio","Aquário","Peixes"];

function getSigno(lon) {
    return signos[Math.floor(lon/30)];
}

// ================= PLANETAS =================
const corpos = ["Sun","Moon","Mercury","Venus","Mars","Jupiter","Saturn","Uranus","Neptune","Pluto"];

const nomes = {
    Sun:"Sol", Moon:"Lua", Mercury:"Mercúrio", Venus:"Vênus",
    Mars:"Marte", Jupiter:"Júpiter", Saturn:"Saturno",
    Uranus:"Urano", Neptune:"Netuno", Pluto:"Plutão"
};

function gerarBase() {
    return signos.map(s => ({ sign:s, planets:[] }));
}

// ================= CÁLCULO =================
function calcularTudo() {
    const hoje = new Date();
    const zodiac = gerarBase();

    corpos.forEach(c => {
        const pos = Astronomy.EclipticPos(c, hoje);
        const signo = getSigno(pos.lon);
        zodiac.find(z => z.sign === signo).planets.push(nomes[c]);
    });

    return { hoje, zodiac };
}

// ================= RENDER =================
function render(data) {
    const { hoje, zodiac } = data;

    const signoHoje = getSigno(Astronomy.EclipticPos("Sun", hoje).lon);

    document.getElementById("moon-display").innerText = calcularLua(hoje);
    document.getElementById("sun-display").innerText = "☀️ Sol em " + signoHoje;

    renderSignos(zodiac, signoHoje);
    renderConjuncoes(zodiac);
    renderElementos();
}

function renderSignos(zodiac, ativo) {
    const container = document.getElementById("zodiac-container");
    container.innerHTML = "";

    const frag = document.createDocumentFragment();

    zodiac.forEach(z => {
        const div = document.createElement("div");
        div.className = "sign-card " + (z.sign === ativo ? "active-sign" : "");

        div.innerHTML = `
            <h3 class="sign-name">${z.sign}</h3>
            <ul class="planets-list">
                ${z.planets.length ? z.planets.map(p => `<li>🪐 ${p}</li>`).join("") : "<li>-</li>"}
            </ul>
        `;

        frag.appendChild(div);
    });

    container.appendChild(frag);
}

function renderConjuncoes(zodiac) {
    const conj = zodiac.filter(z => z.planets.length > 1);

    document.getElementById("conjunctions").innerText =
        conj.length
            ? "✨ Conjunções: " + conj.map(c => `${c.sign} (${c.planets.join(" + ")})`).join(" | ")
            : "Sem conjunções agora.";
}

function renderElementos() {
    const el = [
        {n:"Fogo",d:"Energia, ação",a:"Julgamento",s:"☉"},
        {n:"Água",d:"Emoção",a:"Enforcado",s:"♃"},
        {n:"Ar",d:"Mente",a:"Louco",s:"♂"},
        {n:"Terra",d:"Matéria",a:"Mundo",s:"♄"},
        {n:"Espírito",d:"Éter",a:"Roda",s:"♀"}
    ];

    const c = document.getElementById("elements-container");
    c.innerHTML = "";

    el.forEach(e=>{
        c.innerHTML += `
            <div class="el-row">
                <span>${e.n}</span>
                <span>${e.d}</span>
                <span>${e.a}</span>
                <span>${e.s}</span>
            </div>
        `;
    });
}

// ================= LOOP =================
function start() {
    function update() {
        render(calcularTudo());
    }

    update();
    setInterval(update, REFRESH_INTERVAL);
}

// ================= INIT =================
initObserver().then(start);
</script>

</body>
</html>
