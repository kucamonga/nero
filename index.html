<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmos | Astral & Elementos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Space+Grotesk:wght@300;400&display=swap');

        :root {
            --fogo: #ef4444;
            --terra: #22c55e;
            --ar: #eab308;
            --agua: #3b82f6;
            --espirito: #a855f7;
        }

        body {
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #e2e8f0;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5em;
            color: #d4af37;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .moon-phase {
            font-size: 1.2em;
            color: #cbd5e1;
            background: rgba(255,255,255,0.05);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto 50px;
        }

        .sign-card {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 12px;
            padding: 20px;
            border-left: 5px solid #334155;
            transition: all 0.3s ease;
        }

        .sign-card:hover { transform: scale(1.02); }

        .sign-header { border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .sign-name { font-family: 'Cinzel', serif; font-size: 1.4em; margin: 0; color: #fff; }
        .sign-date { font-size: 0.8em; color: #94a3b8; }

        .planets-list { list-style: none; padding: 0; margin-bottom: 15px; min-height: 50px;}
        .planets-list li { font-size: 0.9em; margin-bottom: 5px; color: #d1d5db; }

        .corresp-row {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            font-family: 'Cinzel', serif;
            color: #d4af37;
        }

        /* Tabela de Elementos */
        .elements-table {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .el-row {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            align-items: center;
        }

        .el-name { font-weight: bold; font-family: 'Cinzel', serif; letter-spacing: 1px; }
        .el-tag { font-size: 0.8em; opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <h1>KOSMOS</h1>
        <div id="moon-display" class="moon-phase">Calculando Lua...</div>
    </header>

    <div class="zodiac-grid" id="zodiac-container"></div>

    <h2 style="text-align: center; font-family: 'Cinzel'; color: #d4af37;">Tabela de Elementos e Regências</h2>
    <div class="elements-table" id="elements-container"></div>

    <script>
        // Sua função de cálculo da Lua
        function calcularLua(d) {
            const dias = (new Date(d) - new Date(2000, 0, 6)) / 86400000;
            const fase = (dias % 29.53) / 29.53;
            const f = fase < 0 ? fase + 1 : fase; // Ajuste para datas passadas
            if (f < 0.25) return "🌒 Lua Crescente";
            if (f < 0.5) return "🌕 Lua Cheia";
            if (f < 0.75) return "🌘 Lua Minguante";
            return "🌑 Lua Nova";
        }

        document.getElementById('moon-display').innerText = calcularLua(new Date());

        const zodiacData = [
            { sign: "Áries", date: "21/03 - 19/04", el: "Fogo", h: "ה", g: "B", p: ["Mercúrio"] },
            { sign: "Touro", date: "20/04 - 20/05", el: "Terra", h: "ו", g: "Γ", p: ["Júpiter", "Urano"] },
            { sign: "Gêmeos", date: "21/05 - 20/06", el: "Ar", h: "ז", g: "Δ", p: [] },
            { sign: "Câncer", date: "21/06 - 22/07", el: "Água", h: "ח", g: "Z", p: ["Lua"] },
            { sign: "Leão", date: "23/07 - 22/08", el: "Fogo", h: "ט", g: "K", p: [] },
            { sign: "Virgem", date: "23/08 - 22/09", el: "Terra", h: "י", g: "Λ", p: [] },
            { sign: "Libra", date: "23/09 - 22/10", el: "Ar", h: "כ", g: "M", p: ["Nodo Sul"] },
            { sign: "Escorpião", date: "23/10 - 21/11", el: "Água", h: "ל", g: "N", p: [] },
            { sign: "Sagitário", date: "22/11 - 21/12", el: "Fogo", h: "מ", g: "Π", p: [] },
            { sign: "Capricórnio", date: "22/12 - 19/01", el: "Terra", h: "נ", g: "P", p: [] },
            { sign: "Aquário", date: "20/01 - 18/02", el: "Ar", h: "ס", g: "Σ", p: ["Sol", "Plutão"] },
            { sign: "Peixes", date: "19/02 - 20/03", el: "Água", h: "ע", g: "T", p: ["Marte", "Saturno"] }
        ];

        const elementsData = [
            { nome: "Terra", cor: "var(--terra)", desc: "Estabilidade, Matéria, Nutrição", letra: "K", astro: "♄" },
            { nome: "Água", cor: "var(--agua)", desc: "Emoção, Intuição, Fluidez", letra: "Q", astro: "♃" },
            { nome: "Ar", cor: "var(--ar)", desc: "Mente, Comunicação, Liberdade", letra: "X", astro: "♂" },
            { nome: "Fogo", cor: "var(--fogo)", desc: "Vontade, Ação, Transmutação", letra: "Z", astro: "☉" },
            { nome: "Espírito", cor: "var(--espirito)", desc: "Unidade, Quintaessência, Éter", letra: "H", astro: "♀" }
        ];

        // Renderizar Signos
        const zContainer = document.getElementById('zodiac-container');
        zodiacData.forEach(d => {
            const color = d.el === "Fogo" ? "var(--fogo)" : d.el === "Terra" ? "var(--terra)" : d.el === "Ar" ? "var(--ar)" : "var(--agua)";
            zContainer.innerHTML += `
                <div class="sign-card" style="border-left-color: ${color}">
                    <div class="sign-header">
                        <h2 class="sign-name">${d.sign}</h2>
                        <span class="sign-date">${d.date} | ${d.el}</span>
                    </div>
                    <ul class="planets-list">${d.p.length ? d.p.map(p => `<li>✨ ${p}</li>`).join('') : '<li>-</li>'}</ul>
                    <div class="corresp-row">
                        <span>${d.h}</span> <span>${d.g}</span> <span>${d.sign[0]}</span>
                    </div>
                </div>`;
        });

        // Renderizar Elementos
        const eContainer = document.getElementById('elements-container');
        elementsData.forEach(e => {
            eContainer.innerHTML += `
                <div class="el-row" style="color: ${e.cor}">
                    <span class="el-name">${e.nome}</span>
                    <span class="el-tag">${e.desc}</span>
                    <span style="text-align: right; font-size: 1.5em;">${e.astro} ${e.letra}</span>
                </div>`;
        });
    </script>
</body>
</html>
