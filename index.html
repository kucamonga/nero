<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa Solidária - 1º de Maio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; text-align: center; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .number { padding: 12px 0; background: #e2e8f0; color: #475569; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; border: 2px solid transparent; }
        .number.selected { background: #3b82f6; color: white; transform: scale(1.05); }
        .number.taken { background: #ef4444; color: white; cursor: not-allowed; opacity: 0.6; }
        .info-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .btn-pay { background: #22c55e; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .pix-area { display: none; margin-top: 20px; padding: 15px; border: 2px dashed #22c55e; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Rifa Solidária</h2>
    <div class="info-box">
        <p><strong>Prêmio:</strong> <span id="premio">Ainda não disponível</span></p>
        <p><strong>Data:</strong> 01 de Maio</p>
        <p><strong>Valor:</strong> R$ 50,00 por número</p>
    </div>

    <div class="grid" id="rifa-grid">Carregando números...</div>

    <div id="form-area" style="display:none;">
        <p>Números selecionados: <strong id="selected-list"></strong></p>
        <p>Total: <strong id="total-val">R$ 0,00</strong></p>
        <input type="text" id="client-name" placeholder="Seu nome completo">
        <button class="btn-pay" onclick="confirmarReserva()">Reservar Números</button>
    </div>

    <div id="pix-area" class="pix-area">
        <p>Pague via PIX:</p>
        <strong style="font-size: 18px;">segatto800@gmail.com</strong>
        <p style="font-size: 12px; color: #64748b;">Envie o comprovante agora:</p>
        <button class="btn-pay" style="background: #25D366;" onclick="irParaWhats()">Enviar Comprovante (WhatsApp)</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxf6U419VBt3xODGAdbyel5YVsDVoOrizbhnRYw5NrIzqeuMAzbhKtwZ8yPJy6WTL7/exec";
    let selecionados = [];
    let ocupados = [];

    // Busca números ocupados na planilha
    async function carregarDados() {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        ocupados = data.map(item => parseInt(item.numero));
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('rifa-grid');
        grid.innerHTML = '';
        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            div.className = 'number' + (ocupados.includes(i) ? ' taken' : '');
            div.innerText = i;
            if (!ocupados.includes(i)) {
                div.onclick = () => toggle(i, div);
            }
            grid.appendChild(div);
        }
    }

    function toggle(num, el) {
        if (selecionados.includes(num)) {
            selecionados = selecionados.filter(n => n !== num);
            el.classList.remove('selected');
        } else {
            selecionados.push(num);
            el.classList.add('selected');
        }
        atualizarResumo();
    }

    function atualizarResumo() {
        const form = document.getElementById('form-area');
        form.style.display = selecionados.length > 0 ? 'block' : 'none';
        document.getElementById('selected-list').innerText = selecionados.join(', ');
        document.getElementById('total-val').innerText = `R$ ${selecionados.length * 50},00`;
    }

    async function confirmarReserva() {
        const nome = document.getElementById('client-name').value;
        if (!nome) return alert("Digite seu nome!");

        const btn = document.querySelector('.btn-pay');
        btn.innerText = "Salvando...";
        btn.disabled = true;

        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'reservar', nome: nome, numeros: selecionados })
        });

        document.getElementById('form-area').style.display = 'none';
        document.getElementById('pix-area').style.display = 'block';
    }

    function irParaWhats() {
        const nome = document.getElementById('client-name').value;
        const msg = `Olá! Meu nome é ${nome}. Reservei os números: ${selecionados.join(', ')}. Total: R$ ${selecionados.length * 50},00. Segue o comprovante!`;
        window.open(`https://wa.me/5527992625772?text=${encodeURIComponent(msg)}`, '_blank');
        location.reload();
    }

    carregarDados();
</script>
</body>
</html>
